<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho: Estimador de Safra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Previsão na Palma da Mão: Estimador de Safra</h1>
            <p>Projeto Agrinho 2026 - Planejamento para o Homem do Campo</p>
        </header>

        <main class="calculadora">
            <h2>Estimativa de Produtividade (Milho)</h2>
            <p class="instrucao">Insira os dados da amostragem de 10 metros lineares:</p>
            
            <div class="campo">
                <label for="espigas">Total de espigas colhidas (em 10m):</label>
                <input type="number" id="espigas" placeholder="Ex: 55">
            </div>

            <div class="campo">
                <label for="graos">Média de grãos por espiga:</label>
                <input type="number" id="graos" placeholder="Ex: 450">
            </div>

            <div class="campo">
                <label for="espacamento">Espaçamento entre linhas (em metros):</label>
                <input type="number" id="espacamento" placeholder="Ex: 0.45" step="0.01">
            </div>

            <button type="button" onclick="calcularSafra()">Estimar Produção</button>

            <div id="resultado" class="resultado-box hidden">
                <h3>Estimativa de Colheita:</h3>
                <p id="texto-resultado"></p>
            </div>
        </main>

        <footer>
            <p>Tecnologia Simplificada para a Agricultura Familiar</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
